services:
  api:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: muppadai
      DB_USERNAME: muppadai
      DB_PASSWORD: muppadai_secret
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
    volumes:
      - ./backend/storage:/var/www/html/storage
    networks:
      - muppadai

  api-nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - muppadai

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:80"
    depends_on:
      - api-nginx
    networks:
      - muppadai

  queue:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work redis --sleep=1 --tries=3 --timeout=120
    env_file:
      - ./backend/.env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: muppadai
      DB_USERNAME: muppadai
      DB_PASSWORD: muppadai_secret
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
    volumes:
      - ./backend/storage:/var/www/html/storage
    networks:
      - muppadai

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: muppadai
      MYSQL_USER: muppadai
      MYSQL_PASSWORD: muppadai_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - muppadai

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - muppadai

volumes:
  mysql-data:
  redis-data:

networks:
  muppadai:
    driver: bridge
