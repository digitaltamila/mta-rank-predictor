    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does Muppadai Rank Predictor calculate scores?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The application parses your response sheet from the Digialm or cbexams URL, compares your selected answers with the official answer key, and applies the active marking scheme for your exam (e.g. +2 for correct, -0.5 for wrong)."
          }
        },
        {
          "@type": "Question",
          "name": "Is the rank predictor free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Muppadai Rank Predictor is completely free for all candidates. Simply paste your response sheet URL and get your predicted rank instantly."
          }
        },
        {
          "@type": "Question",
          "name": "Which exams are supported?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Currently supports SSC GD, RRB NTPC, RRB ALP, RRB Group D, SSC CGL, SSC CHSL, SSC MTS, and other exams using Digialm or cbexams response sheets. More exams are added regularly."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate is the predicted rank?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The rank is predicted based on the scores of all candidates who have submitted their results on the portal. The more candidates submit, the more accurate the prediction becomes."
          }
        },
        {
          "@type": "Question",
          "name": "What is category rank and state rank?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Category rank is your rank among candidates of the same reservation category (UR, OBC, SC, ST, EWS). State rank is your rank among candidates from the same state. Both are calculated from submitted scores on the portal."
          }
        },
        {
          "@type": "Question",
          "name": "What is percentile based on?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Percentile is calculated from your predicted rank and the total number of candidates who submitted their result for the exam on the Muppadai portal."
          }
        }
      ]
    }
    </script>
